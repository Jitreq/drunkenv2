name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Linux build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config
          flutter doctor -v

      - name: Prepare Windows build environment
        if: matrix.platform == 'windows'
        shell: pwsh
        run: flutter doctor -v

      - name: Build Android app bundle
        if: matrix.platform == 'android'
        run: flutter build appbundle --release

      - name: Build Linux release
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build macOS release
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Build iOS release
        if: matrix.platform == 'macos'
        run: flutter build ios --release --no-codesign

      - name: Build Windows release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: flutter build windows --release

      - name: Package Android artifact
        if: matrix.platform == 'android'
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/app-release.aab

      - name: Package Linux artifact
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          cd build/linux/x64/release
          zip -r "$GITHUB_WORKSPACE/release-artifacts/linux-release.zip" bundle

      - name: Package macOS artifact
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          app_path=$(find build/macos -maxdepth 6 -type d -name '*.app' | head -n 1)
          if [ -z "$app_path" ]; then
            echo "macOS app bundle not found under build/macos"
            find build/macos -maxdepth 6 -type d -name '*.app' -print
            exit 1
          fi
          app_dir=$(dirname "$app_path")
          app_name=$(basename "$app_path")
          cd "$app_dir"
          zip -r "$GITHUB_WORKSPACE/release-artifacts/macos-release.zip" "$app_name"

      - name: Package iOS artifact
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          app_path=$(find build/ios -maxdepth 8 -type d -name '*.app' | head -n 1)
          if [ -z "$app_path" ]; then
            echo "iOS app bundle not found under build/ios"
            find build/ios -maxdepth 8 -type d -name '*.app' -print
            exit 1
          fi
          app_dir=$(dirname "$app_path")
          app_name=$(basename "$app_path")
          cd "$app_dir"
          zip -r "$GITHUB_WORKSPACE/release-artifacts/ios-release.zip" "$app_name"

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-artifacts -Force | Out-Null
          $releasePath = Get-ChildItem -Path "$PWD\build\windows" -Directory -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match 'Release$' } |
            Select-Object -First 1
          if (-Not $releasePath) {
            Write-Host "Windows release directory not found under build/windows"
            Get-ChildItem -Path "$PWD\build\windows" -Directory -Recurse | Select-Object FullName
            throw "Windows release path not found"
          }
          Write-Host "Found Windows release directory: $($releasePath.FullName)"
          Compress-Archive -Path "$($releasePath.FullName)\*" -DestinationPath "$PWD\release-artifacts\windows-release.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
