name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: linux
            os: ubuntu-latest
          - platform: windows
            os: windows-latest
          - platform: macos
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: .fvmrc
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Linux build dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config
          flutter doctor -v

      - name: Prepare Windows build environment
        if: matrix.platform == 'windows'
        shell: pwsh
        run: flutter doctor -v

      - name: Build Android APK
        if: matrix.platform == 'android'
        run: flutter build apk --release

      - name: Build Linux release
        if: matrix.platform == 'linux'
        run: flutter build linux --release

      - name: Build macOS release
        if: matrix.platform == 'macos'
        run: flutter build macos --release

      - name: Build iOS release
        if: matrix.platform == 'macos'
        run: flutter build ios --release --no-codesign

      - name: Build Windows release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: flutter build windows --release

      - name: Package Android artifact
        if: matrix.platform == 'android'
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/drunken-android.apk

      - name: Package Linux artifact
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-artifacts
          cd build/linux/x64/release
          zip -r "$GITHUB_WORKSPACE/release-artifacts/drunken-linux.zip" bundle

      - name: Package macOS artifact
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          app_path=$(find build/macos -maxdepth 8 -type d -name '*.app' | head -n 1)
          if [ -z "$app_path" ]; then
            echo "macOS app bundle not found under build/macos"
            find build/macos -maxdepth 8 -type d -name '*.app' -print
            exit 1
          fi
          app_dir=$(dirname "$app_path")
          app_name=$(basename "$app_path")
          cd "$app_dir"
          zip -r "$GITHUB_WORKSPACE/release-artifacts/drunken-macos.zip" "$app_name"

      - name: Package iOS artifact
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-artifacts
          app_path=$(find build/ios -maxdepth 12 -type d -name '*.app' | head -n 1)
          if [ -z "$app_path" ]; then
            echo "iOS app bundle not found under build/ios"
            find build/ios -maxdepth 12 -type d -name '*.app' -print
            exit 1
          fi
          app_dir=$(dirname "$app_path")
          app_name=$(basename "$app_path")
          cd "$app_dir"
          zip -r "$GITHUB_WORKSPACE/release-artifacts/drunken-ios.zip" "$app_name"

      - name: Package Windows artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-artifacts -Force | Out-Null
          $root = (Resolve-Path .).Path
          $releasePath = Join-Path $root 'build\windows\runner\Release'
          if (-Not (Test-Path $releasePath)) {
            Write-Host "Windows release directory not found: $releasePath"
            Write-Host "Looking for executable under build/windows..."
            Get-ChildItem -Path "$root\build\windows" -Recurse -Filter '*.exe' -ErrorAction SilentlyContinue |
              Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
            $exeFile = Get-ChildItem -Path "$root\build\windows" -Recurse -Filter '*.exe' -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch '\\.dart_tool' } |
              Select-Object -First 1
            if (-Not $exeFile) {
              throw "No .exe file found under build/windows"
            }
            $releasePath = Split-Path -Parent $exeFile.FullName
            Write-Host "Using exe directory: $releasePath"
          }
          Compress-Archive -Path "$releasePath\*" -DestinationPath "$root\release-artifacts\drunken-windows.zip"

      - name: Upload Android artifact
        if: matrix.platform == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: drunken-android.apk
          path: release-artifacts/drunken-android.apk

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: drunken-linux.zip
          path: release-artifacts/drunken-linux.zip

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: drunken-macos.zip
          path: release-artifacts/drunken-macos.zip

      - name: Upload iOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: drunken-ios.zip
          path: release-artifacts/drunken-ios.zip

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: drunken-windows.zip
          path: release-artifacts/drunken-windows.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: ls -la release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
